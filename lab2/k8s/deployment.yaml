# ========================================
# Deployment Kubernetes - Lab 2
# Para usar apos o pipeline gerar a imagem
# Cloud Computing - SETREM
# ========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab2-api
  labels:
    app: lab2-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab2-api
  template:
    metadata:
      labels:
        app: lab2-api
    spec:
      containers:
      - name: api
        image: lab2-api:latest
        imagePullPolicy: Never  # Imagem local no Rancher Desktop
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: lab2-api-svc
spec:
  type: NodePort
  selector:
    app: lab2-api
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30081
