# ========================================
  # Deployment Kubernetes - Lab 3 (GitOps)
  # Este arquivo e atualizado automaticamente pelo pipeline
  # NAO editar a tag da imagem manualmente
  # ========================================
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: lab3-api
    labels:
      app: lab3-api
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: lab3-api
    template:
      metadata:
        labels:
          app: lab3-api
      spec:
        containers:
        - name: api
          image: ghcr.io/setrem-cloud/setrem-labs:f7bda2ffd149763af63329b06500f638eb90313f
          ports:
          - containerPort: 8080
          env:
          - name: EQUIPE
            value: "setrem"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: lab3-api-svc
  spec:
    type: LoadBalancer
    selector:
      app: lab3-api
    ports:
    - port: 80
      targetPort: 8080